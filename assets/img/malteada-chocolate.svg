<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 300" role="img" aria-label="Malteada de chocolate con barras de chocolate a los lados">
  <defs>
    <linearGradient id="shakec" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9C6B44"/>
      <stop offset="1" stop-color="#6B4226"/>
    </linearGradient>
    <linearGradient id="barra" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6E4526"/>
      <stop offset="1" stop-color="#4A2C15"/>
    </linearGradient>
  </defs>
  <ellipse cx="160" cy="278" rx="120" ry="13" fill="#3A2314" opacity=".14"/>

  <!-- bombilla -->
  <rect x="182" y="18" width="13" height="96" rx="6" fill="#F2A93B" transform="rotate(14 188 66)"/>
  <path d="M186 30 l12 3 M182 46 l12 3 M178 62 l12 3" stroke="#FFF3E4" stroke-width="4" stroke-linecap="round"/>

  <!-- vaso -->
  <path d="M112 92 L208 92 L196 246 C195 256 188 262 179 262 L141 262 C132 262 125 256 124 246 Z" fill="url(#shakec)"/>
  <path d="M124 112 L196 112 M126 140 L194 140" stroke="#B98A62" stroke-width="5" stroke-linecap="round" opacity=".6"/>
  <path d="M132 100 L142 250" stroke="#D8B491" stroke-width="7" stroke-linecap="round" opacity=".5"/>
  <ellipse cx="160" cy="92" rx="48" ry="10" fill="#B98A62"/>

  <!-- crema batida con hilos de chocolate -->
  <path d="M116 92 C108 70 128 62 138 70 C134 50 160 44 168 58 C172 40 198 44 196 60 C212 58 218 76 206 84 C214 90 208 98 200 96 L120 96 C112 96 112 96 116 92 Z" fill="#FFFDF7"/>
  <path d="M126 84 C140 74 152 86 166 76 C178 68 190 78 200 72" stroke="#6B4226" stroke-width="4" fill="none" stroke-linecap="round" opacity=".85"/>
  <path d="M134 66 C146 60 156 68 168 62" stroke="#6B4226" stroke-width="3.4" fill="none" stroke-linecap="round" opacity=".7"/>

  <!-- trozo de chocolate en el borde -->
  <g transform="translate(116 74) rotate(-16)">
    <rect x="-14" y="-12" width="28" height="28" rx="4" fill="url(#barra)"/>
    <path d="M-14 2 H14 M0 -12 V16" stroke="#3A2314" stroke-width="2.4"/>
    <rect x="-9" y="-8" width="8" height="6" rx="2" fill="#8A5A36" opacity=".9"/>
  </g>

  <!-- barras de chocolate a los lados -->
  <g transform="translate(46 200) rotate(-14)">
    <rect x="0" y="0" width="44" height="78" rx="6" fill="url(#barra)"/>
    <path d="M0 26 H44 M0 52 H44 M22 0 V78" stroke="#3A2314" stroke-width="3"/>
    <rect x="5" y="5" width="14" height="10" rx="2" fill="#8A5A36" opacity=".9"/>
    <rect x="27" y="31" width="12" height="9" rx="2" fill="#8A5A36" opacity=".7"/>
    <rect x="5" y="57" width="14" height="10" rx="2" fill="#8A5A36" opacity=".8"/>
  </g>
  <g transform="translate(238 210) rotate(16)">
    <rect x="0" y="0" width="44" height="72" rx="6" fill="url(#barra)"/>
    <path d="M0 24 H44 M0 48 H44 M22 0 V72" stroke="#3A2314" stroke-width="3"/>
    <rect x="5" y="5" width="14" height="9" rx="2" fill="#8A5A36" opacity=".9"/>
    <rect x="27" y="29" width="12" height="9" rx="2" fill="#8A5A36" opacity=".7"/>
  </g>
  <g transform="translate(282 190) rotate(38)">
    <rect x="0" y="0" width="26" height="46" rx="4" fill="url(#barra)"/>
    <path d="M0 15 H26 M0 30 H26 M13 0 V46" stroke="#3A2314" stroke-width="2.4"/>
  </g>
