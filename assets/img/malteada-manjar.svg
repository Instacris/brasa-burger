<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 300" role="img" aria-label="Malteada de manjar con galletas a los lados">
  <defs>
    <linearGradient id="shakem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E5B26A"/>
      <stop offset="1" stop-color="#C1863F"/>
    </linearGradient>
    <linearGradient id="galleta" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D9A45C"/>
      <stop offset="1" stop-color="#B97F35"/>
    </linearGradient>
  </defs>
  <ellipse cx="160" cy="278" rx="120" ry="13" fill="#3A2314" opacity=".14"/>

  <!-- bombilla -->
  <rect x="182" y="18" width="13" height="96" rx="6" fill="#8A5A2B" transform="rotate(14 188 66)"/>
  <path d="M186 30 l12 3 M182 46 l12 3 M178 62 l12 3" stroke="#FFF3E4" stroke-width="4" stroke-linecap="round"/>

  <!-- vaso -->
  <path d="M112 92 L208 92 L196 246 C195 256 188 262 179 262 L141 262 C132 262 125 256 124 246 Z" fill="url(#shakem)"/>
  <path d="M124 112 L196 112 M126 140 L194 140" stroke="#EFCB92" stroke-width="5" stroke-linecap="round" opacity=".7"/>
  <path d="M132 100 L142 250" stroke="#F7E0B4" stroke-width="7" stroke-linecap="round" opacity=".55"/>
  <ellipse cx="160" cy="92" rx="48" ry="10" fill="#EFCB92"/>

  <!-- crema batida con manjar -->
  <path d="M116 92 C108 70 128 62 138 70 C134 50 160 44 168 58 C172 40 198 44 196 60 C212 58 218 76 206 84 C214 90 208 98 200 96 L120 96 C112 96 112 96 116 92 Z" fill="#FFFDF7"/>
  <path d="M124 86 C138 76 150 88 164 78 C176 70 190 80 202 74 C196 84 188 82 180 86 C168 92 152 84 140 90 Z" fill="#C1863F" opacity=".9"/>

  <!-- galleta en el borde -->
  <g transform="translate(118 72) rotate(-14)">
    <circle cx="0" cy="0" r="20" fill="url(#galleta)"/>
    <g fill="#5C3A21"><circle cx="-7" cy="-5" r="2.6"/><circle cx="6" cy="-8" r="2.6"/><circle cx="2" cy="6" r="2.6"/><circle cx="-9" cy="7" r="2.2"/></g>
  </g>

  <!-- galletas decorativas a los lados -->
  <g transform="translate(58 234)">
    <circle cx="0" cy="0" r="30" fill="url(#galleta)"/>
    <g fill="#5C3A21"><circle cx="-10" cy="-8" r="3.6"/><circle cx="9" cy="-12" r="3.6"/><circle cx="3" cy="9" r="3.6"/><circle cx="-14" cy="10" r="3"/><circle cx="14" cy="4" r="3"/></g>
  </g>
  <g transform="translate(96 258) rotate(20)">
    <path d="M-24 0 A24 24 0 0 1 24 0 L24 4 A24 24 0 0 1 -24 4 Z" fill="url(#galleta)"/>
    <path d="M-24 2 H24" stroke="#FFFDF7" stroke-width="5"/>
  </g>
  <g transform="translate(262 230) rotate(12)">
    <circle cx="0" cy="0" r="26" fill="url(#galleta)"/>
    <g fill="#5C3A21"><circle cx="-8" cy="-7" r="3.2"/><circle cx="8" cy="-10" r="3.2"/><circle cx="2" cy="8" r="3.2"/><circle cx="-12" cy="9" r="2.8"/></g>
  </g>
  <!-- hilo de manjar -->
  <path d="M236 268 C252 262 268 274 284 268" stroke="#C1863F" stroke-width="6" fill="none" stroke-linecap="round" opacity=".8"/>
</svg>
