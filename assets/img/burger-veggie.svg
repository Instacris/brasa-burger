  <rect x="96" y="274" width="320" height="48" rx="24" fill="url(#vegpatty)"/>
  <g opacity=".85">
    <circle cx="140" cy="292" r="4" fill="#D9534F"/><circle cx="178" cy="306" r="3.6" fill="#F2C14E"/>
    <circle cx="214" cy="288" r="4" fill="#7CB84C"/><circle cx="252" cy="306" r="3.6" fill="#D9534F"/>
    <circle cx="290" cy="288" r="4" fill="#F2C14E"/><circle cx="328" cy="306" r="3.6" fill="#7CB84C"/>
    <circle cx="364" cy="290" r="4" fill="#D9534F"/><circle cx="196" cy="316" r="3" fill="#F2C14E"/>
    <circle cx="312" cy="316" r="3" fill="#D9534F"/>
  </g>

