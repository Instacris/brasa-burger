<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 460" role="img" aria-label="Hamburguesa veggie de la huerta con palta">
  <defs>
    <linearGradient id="bunTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F8BC66"/>
      <stop offset=".55" stop-color="#E08A33"/>
      <stop offset="1" stop-color="#C56E27"/>
    </linearGradient>
    <linearGradient id="bunBot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EFB05B"/>
      <stop offset="1" stop-color="#BC6524"/>
    </linearGradient>
    <linearGradient id="vegpatty" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#96913F"/>
      <stop offset="1" stop-color="#6A662A"/>
    </linearGradient>
    <linearGradient id="tomato" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E85543"/>
      <stop offset="1" stop-color="#C23524"/>
    </linearGradient>
    <linearGradient id="palta" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B5D67E"/>
      <stop offset="1" stop-color="#7FA946"/>
    </linearGradient>
  </defs>

  <!-- sombra -->
  <ellipse cx="256" cy="408" rx="182" ry="19" fill="#3A2314" opacity=".16"/>

