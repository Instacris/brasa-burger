  <rect x="118" y="252" width="276" height="4" rx="2" fill="#F08A76" opacity=".7"/>

  <!-- lechuga doble -->
  <path d="M86 208 H426 V216 C418 234 402 238 394 226 C386 240 368 242 360 228 C350 244 332 244 324 230 C314 244 296 244 288 230 C278 246 260 244 252 230 C242 244 224 244 216 228 C206 242 188 242 180 226 C172 238 156 240 148 226 C140 236 126 236 118 224 C108 234 92 230 86 218 Z" fill="#7CB84C"/>
