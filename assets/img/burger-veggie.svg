  <g stroke="#6E9840" stroke-width="1.4">
    <path d="M110 274 C110 252 134 238 156 244 C142 252 134 262 132 274 Z" fill="url(#palta)"/>
    <path d="M164 272 C168 248 196 236 218 244 C202 250 192 260 188 274 Z" fill="url(#palta)"/>
