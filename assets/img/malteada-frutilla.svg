  </g>
  <g transform="translate(268 220) rotate(14)">
    <path d="M0 0 C-18 0 -27 14 -20 30 C-15 41 -5 48 0 52 C5 48 15 41 20 30 C27 14 18 0 0 0 Z" fill="url(#fresa)"/>
