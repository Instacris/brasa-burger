<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 300" role="img" aria-label="Malteada de frutilla con frutillas frescas a los lados">
  <defs>
    <linearGradient id="shake" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F9AEC6"/>
      <stop offset="1" stop-color="#EC6F9E"/>
    </linearGradient>
    <linearGradient id="fresa" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E8504F"/>
      <stop offset="1" stop-color="#C22C3B"/>
    </linearGradient>
  </defs>
  <ellipse cx="160" cy="278" rx="120" ry="13" fill="#3A2314" opacity=".14"/>

  <!-- bombilla -->
  <rect x="182" y="18" width="13" height="96" rx="6" fill="#E8504F" transform="rotate(14 188 66)"/>
  <path d="M186 30 l12 3 M182 46 l12 3 M178 62 l12 3" stroke="#FFF3E4" stroke-width="4" stroke-linecap="round"/>

  <!-- vaso -->
  <path d="M112 92 L208 92 L196 246 C195 256 188 262 179 262 L141 262 C132 262 125 256 124 246 Z" fill="url(#shake)"/>
  <path d="M124 112 L196 112 M126 140 L194 140" stroke="#F9C6D8" stroke-width="5" stroke-linecap="round" opacity=".75"/>
  <path d="M132 100 L142 250" stroke="#FDE3ED" stroke-width="7" stroke-linecap="round" opacity=".55"/>
  <ellipse cx="160" cy="92" rx="48" ry="10" fill="#F9C6D8"/>

  <!-- crema batida -->
  <path d="M116 92 C108 70 128 62 138 70 C134 50 160 44 168 58 C172 40 198 44 196 60 C212 58 218 76 206 84 C214 90 208 98 200 96 L120 96 C112 96 112 96 116 92 Z" fill="#FFFDF7"/>
  <path d="M130 78 Q146 68 160 76 M168 66 Q182 60 192 70" stroke="#EBD9C0" stroke-width="4" fill="none" stroke-linecap="round" opacity=".8"/>

