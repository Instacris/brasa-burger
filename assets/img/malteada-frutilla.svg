    <g fill="#F7D08A"><circle cx="-6" cy="14" r="1.6"/><circle cx="2" cy="20" r="1.6"/><circle cx="7" cy="12" r="1.6"/></g>
  </g>

  <!-- frutillas decorativas a los lados -->
  <g transform="translate(56 226) rotate(-10)">
    <path d="M0 0 C-20 0 -30 16 -22 34 C-16 46 -6 54 0 58 C6 54 16 46 22 34 C30 16 20 0 0 0 Z" fill="url(#fresa)"/>
    <path d="M-12 -4 L0 6 L12 -4 L6 10 L0 4 L-6 10 Z" fill="#5C8A34"/>
