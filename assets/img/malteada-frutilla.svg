  </g>
  <g transform="translate(286 268) rotate(40)">
    <path d="M0 0 C-12 0 -18 10 -13 20 C-10 27 -3 32 0 34 C3 32 10 27 13 20 C18 10 12 0 0 0 Z" fill="url(#fresa)"/>
